<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>어휘여우 🦊 국어 어휘 학습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --mint:#B7E4C7;
    --mint-dark:#6FBF8B;
    --coral:#FFB5A7;
    --coral-dark:#FF8C7A;
    --butter:#FFE29A;
    --butter-dark:#FFCB61;
    --lavender:#D8C9F0;
    --lavender-dark:#B79CE8;
    --cream:#FFF8EF;
    --ink:#4A4460;
    --ink-soft:#8B85A0;
    --white:#FFFFFF;
    --shadow: 0 6px 0 rgba(74,68,96,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Gowun Dodum', sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(183,228,199,0.35), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(255,181,167,0.3), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(216,201,240,0.3), transparent 45%),
      var(--cream);
    min-height:100vh;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Jua', sans-serif;}
  #app{
    max-width:520px;
    margin:0 auto;
    padding:20px 16px 60px;
    min-height:100vh;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .logo{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Jua', sans-serif;
    font-size:22px;
    color:var(--ink);
  }
  .logo .fox{font-size:30px;}
  .streak-chip{
    display:flex;
    align-items:center;
    gap:4px;
    background:var(--white);
    border-radius:999px;
    padding:6px 14px;
    font-size:14px;
    font-weight:600;
    box-shadow:var(--shadow);
    color:var(--coral-dark);
  }
  .card{
    background:var(--white);
    border-radius:26px;
    padding:24px 20px;
    box-shadow:var(--shadow);
    margin-bottom:16px;
    position:relative;
  }
  .hero-card{
    background:linear-gradient(160deg, var(--mint) 0%, #CDEEDA 100%);
    text-align:center;
    padding:32px 20px 26px;
  }
  .hero-fox{
    font-size:64px;
    display:block;
    margin-bottom:6px;
    filter:drop-shadow(0 4px 0 rgba(0,0,0,0.06));
  }
  .hero-title{
    font-family:'Jua', sans-serif;
    font-size:24px;
    margin:6px 0 4px;
    color:var(--ink);
  }
  .hero-sub{
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 18px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'Jua', sans-serif;
    font-size:17px;
    border:none;
    border-radius:18px;
    padding:15px 20px;
    cursor:pointer;
    width:100%;
    transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 5px 0 rgba(0,0,0,0.12);
  }
  .btn:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,0.12);}
  .btn-primary{background:var(--coral); color:#fff;}
  .btn-secondary{background:var(--white); color:var(--ink); border:2px solid var(--lavender);}
  .btn-mint{background:var(--mint-dark); color:#fff;}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:6px;
  }
  .stat-box{
    background:var(--cream);
    border-radius:16px;
    padding:14px 8px;
    text-align:center;
  }
  .stat-num{
    font-family:'Jua', sans-serif;
    font-size:22px;
    color:var(--ink);
    display:block;
  }
  .stat-label{
    font-size:12px;
    color:var(--ink-soft);
  }
  .section-title{
    font-family:'Jua', sans-serif;
    font-size:16px;
    margin:0 0 10px;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .history-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 4px;
    border-bottom:1px dashed #EEE3D3;
    font-size:14px;
  }
  .history-row:last-child{border-bottom:none;}
  .history-date{color:var(--ink-soft);}
  .history-bar-wrap{
    flex:1;
    margin:0 12px;
    height:8px;
    background:#F0EAE0;
    border-radius:99px;
    overflow:hidden;
  }
  .history-bar{height:100%; border-radius:99px;}
  .history-pct{font-weight:700; width:44px; text-align:right;}
  .progress-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .progress-track{
    flex:1;
    height:12px;
    background:#EFE7D8;
    border-radius:99px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--mint-dark), var(--butter-dark));
    border-radius:99px;
    transition:width .3s ease;
  }
  .progress-count{
    font-family:'Jua', sans-serif;
    font-size:14px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .q-type-badge{
    display:inline-block;
    font-size:12px;
    font-weight:700;
    padding:4px 10px;
    border-radius:99px;
    margin-bottom:14px;
  }
  .badge-w2m{background:var(--lavender); color:#5D4A99;}
  .badge-m2w{background:var(--butter); color:#8A6200;}
  .question-word{
    font-family:'Jua', sans-serif;
    font-size:26px;
    text-align:center;
    margin:6px 0 22px;
    color:var(--ink);
    line-height:1.4;
    word-break:keep-all;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option{
    display:flex;
    align-items:center;
    gap:12px;
    text-align:left;
    background:var(--cream);
    border:2px solid transparent;
    border-radius:16px;
    padding:14px 16px;
    font-size:15px;
    cursor:pointer;
    font-family:'Gowun Dodum', sans-serif;
    color:var(--ink);
    word-break:keep-all;
  }
  .option .num{
    font-family:'Jua', sans-serif;
    width:26px;
    height:26px;
    min-width:26px;
    border-radius:50%;
    background:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:var(--ink-soft);
  }
  .option.correct{background:#DFF3E4; border-color:var(--mint-dark);}
  .option.correct .num{background:var(--mint-dark); color:#fff;}
  .option.wrong{background:#FCE3E0; border-color:var(--coral-dark);}
  .option.wrong .num{background:var(--coral-dark); color:#fff;}
  .option.disabled{cursor:default;}
  .feedback{
    text-align:center;
    font-family:'Jua', sans-serif;
    font-size:15px;
    margin-top:14px;
    min-height:22px;
  }
  .feedback.ok{color:var(--mint-dark);}
  .feedback.no{color:var(--coral-dark);}
  .example-box{
    background:var(--cream);
    border-radius:16px;
    padding:14px 16px;
    margin-top:14px;
    font-size:14px;
    line-height:1.6;
    color:var(--ink);
    display:none;
  }
  .example-box.show{display:block; animation:pop .25s ease;}
  .example-box .ex-label{
    font-family:'Jua', sans-serif;
    font-size:12px;
    color:var(--lavender-dark);
    display:block;
    margin-bottom:4px;
  }
  .next-btn-wrap{margin-top:16px; display:none;}
  .next-btn-wrap.show{display:block;}
  .grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:16px;
  }
  .nav-card{
    background:var(--white);
    border-radius:22px;
    padding:18px 16px;
    box-shadow:var(--shadow);
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .12s ease;
  }
  .nav-card:active{transform:translateY(2px);}
  .nav-card .nav-icon{font-size:26px; display:block; margin-bottom:8px;}
  .nav-card .nav-title{
    font-family:'Jua', sans-serif;
    font-size:15px;
    color:var(--ink);
    margin-bottom:2px;
  }
  .nav-card .nav-sub{font-size:12px; color:var(--ink-soft);}
  .nav-card.wrongbook{border-color:var(--coral);}
  .flash-card{
    background:var(--white);
    border-radius:26px;
    padding:36px 20px;
    box-shadow:var(--shadow);
    text-align:center;
    min-height:260px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .flash-progress{
    font-family:'Jua', sans-serif;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .flash-level-tag{
    font-size:11px;
    padding:3px 10px;
    border-radius:99px;
    background:var(--lavender);
    color:#5D4A99;
    margin-bottom:14px;
  }
  .flash-word{
    font-family:'Jua', sans-serif;
    font-size:38px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:18px;
    word-break:keep-all;
  }
  .flash-meaning{
    background:var(--cream);
    border-radius:16px;
    padding:16px;
    font-size:18px;
    font-weight:700;
    line-height:1.6;
    color:var(--ink);
    text-align:left;
    margin-bottom:6px;
  }
  .flash-meaning .fm-label{
    font-family:'Jua', sans-serif;
    font-size:12px;
    font-weight:400;
    color:var(--mint-dark);
    display:block;
    margin-bottom:4px;
  }
  .flash-meaning .fm-ex{
    margin-top:8px;
    color:var(--ink-soft);
    font-size:14px;
    font-weight:400;
  }
  .wrongbook-list{ margin-top:4px; }
  .wrongbook-item{
    background:var(--white);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:10px;
    box-shadow:var(--shadow);
  }
  .wrongbook-item .wb-word{
    font-family:'Jua', sans-serif;
    font-size:17px;
    color:var(--coral-dark);
    margin-bottom:4px;
  }
  .wrongbook-item .wb-meaning{
    font-size:14px;
    color:var(--ink);
    margin-bottom:4px;
    line-height:1.5;
  }
  .wrongbook-item .wb-ex{
    font-size:12px;
    color:var(--ink-soft);
  }
  .result-emoji{font-size:56px; text-align:center; display:block; margin-bottom:8px;}
  .result-score{
    font-family:'Jua', sans-serif;
    font-size:38px;
    text-align:center;
    color:var(--ink);
  }
  .result-sub{text-align:center; color:var(--ink-soft); margin-bottom:20px; font-size:14px;}
  .wrong-list{
    background:var(--cream);
    border-radius:16px;
    padding:12px 16px;
    margin:14px 0;
  }
  .wrong-list-item{
    font-size:14px;
    padding:6px 0;
    border-bottom:1px dashed #EEE3D3;
  }
  .wrong-list-item:last-child{border-bottom:none;}
  .wrong-list-item b{color:var(--coral-dark);}
  .footer-note{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:24px;
    line-height:1.6;
  }
  .empty-state{
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    padding:20px 0;
  }
  .level-tag{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:99px;
    background:var(--lavender);
    color:#5D4A99;
    margin-left:6px;
    vertical-align:middle;
  }
  @keyframes pop{
    0%{transform:scale(0.9); opacity:0;}
    100%{transform:scale(1); opacity:1;}
  }
  .card, .option{animation:pop .25s ease;}
  @media (prefers-reduced-motion: reduce){
    .card, .option{animation:none;}
    .btn{transition:none;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>

const DAILY_GOAL = 30;
const LEVEL_LABEL = {elem:"초등", mid:"중등", high:"고등·수능"};
const STORAGE_KEY = "eohwifox_state_v1";

/* ========================= 2. 유틸 함수 ========================= */
function todayStr(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function addDays(dateStr, n){
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate()+n);
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    return defaultState();
  }
}
function defaultState(){
  return {
    progress:{},      // word -> {status:'review7'|'review30'|'mastered', due:'YYYY-MM-DD'}
    history:[],        // [{date, correct, total}]
    streak:0,
    lastDate:null,
    todaySession:null
  };
}
function saveState(state){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

/* ========================= 3. 세션(문제) 생성 ========================= */
function wordByText(text){ return WORDS.find(x=>x.w===text); }

function buildOptions(correctWordObj, type){
  // type: 'w2m' (단어->뜻) or 'm2w' (뜻->단어)
  const pool = WORDS.filter(x=>x.w!==correctWordObj.w);
  const distractors = shuffle(pool).slice(0,3);
  const correctText = type==='w2m' ? correctWordObj.m : correctWordObj.w;
  const optionTexts = distractors.map(d => type==='w2m' ? d.m : d.w);
  return {correctText, optionTexts};
}

function makeQuestion(wordObj, type, correctPos){
  const {correctText, optionTexts} = buildOptions(wordObj, type);
  const options = new Array(4);
  options[correctPos] = correctText;
  const shuffledWrong = shuffle(optionTexts);
  let wi=0;
  for(let i=0;i<4;i++){
    if(i===correctPos) continue;
    options[i]=shuffledWrong[wi++];
  }
  return {
    word: wordObj.w,
    lv: wordObj.lv,
    type,
    prompt: type==='w2m' ? wordObj.w : wordObj.m,
    options,
    correctIndex: correctPos,
    answered:false,
    userAnswer:null
  };
}

function pickWordsForToday(state, today){
  const dueWords = [];
  const newCandidates = [];
  for(const w of WORDS){
    const p = state.progress[w.w];
    if(!p){
      newCandidates.push(w);
    }else if(p.status!=='mastered' && p.due && p.due<=today){
      dueWords.push(w);
    }
  }
  let selected = shuffle(dueWords);
  if(selected.length < DAILY_GOAL){
    const need = DAILY_GOAL - selected.length;
    selected = selected.concat(shuffle(newCandidates).slice(0,need));
  }
  if(selected.length < DAILY_GOAL){
    // 새 단어도 부족하면 마스터한 단어라도 복습용으로 채움
    const rest = WORDS.filter(w => !selected.find(s=>s.w===w.w));
    selected = selected.concat(shuffle(rest).slice(0, DAILY_GOAL-selected.length));
  }
  return selected.slice(0, DAILY_GOAL);
}

function generateSession(state){
  const today = todayStr();
  const words = pickWordsForToday(state, today);
  const questions = words.map((w,i)=>{
    const type = i%2===0 ? 'w2m' : 'm2w';
    const correctPos = i%4;
    return makeQuestion(w, type, correctPos);
  });
  return {
    questions: shuffle(questions),
    studyWords: words.map(w=>w.w),
    studyIndex: 0,
    phase: 'study',
    index:0,
    correctCount:0,
    wrongList:[],
    finished:false,
    retryQueue:[],
    retryIndex:0,
    retryActive:false,
    retryFinished:false
  };
}

/* ========================= 4. 진행도(간격 반복) 업데이트 ========================= */
function updateProgressOnAnswer(state, word, isCorrect, today){
  const p = state.progress[word] || {status:null, due:null, everWrong:false};
  if(isCorrect){
    if(!p.status){
      p.status='review7'; p.due=addDays(today,7);
    }else if(p.status==='review7'){
      p.status='review30'; p.due=addDays(today,30);
    }else if(p.status==='review30'){
      p.status='mastered'; p.due=null; p.everWrong=false;
    }else{
      p.status='mastered'; p.due=null; p.everWrong=false;
    }
  }else{
    p.status=null; p.due=null; // 초기화 -> 다음 새 단어 뽑을 때 다시 학습
    p.everWrong=true;
  }
  state.progress[word]=p;
}

function wrongBookWords(){
  return Object.keys(STATE.progress)
    .filter(w => STATE.progress[w].everWrong && STATE.progress[w].status!=='mastered')
    .map(w => wordByText(w))
    .filter(Boolean);
}

function finalizeSession(state){
  const today = todayStr();
  const sess = state.todaySession;
  const total = sess.questions.length;
  const correct = sess.correctCount;
  const existingIdx = state.history.findIndex(h=>h.date===today);
  const entry = {date:today, correct, total};
  if(existingIdx>=0) state.history[existingIdx]=entry;
  else state.history.push(entry);
  state.history.sort((a,b)=> a.date<b.date?-1:1);

  // streak 계산
  const yesterday = addDays(today,-1);
  if(state.lastDate===yesterday || state.lastDate===today){
    if(state.lastDate!==today) state.streak = (state.streak||0)+1;
  }else{
    state.streak = 1;
  }
  state.lastDate = today;
  sess.finished = true;
  saveState(state);
}

function handleAnswer(idx){
  const sess = STATE.todaySession;
  const q = sess.questions[sess.index];
  if(q.answered) return;
  q.answered = true;
  q.userAnswer = idx;
  const isCorrect = idx===q.correctIndex;
  const today = todayStr();

  if(isCorrect) sess.correctCount++;
  else if(!sess.wrongList.includes(q.word)) sess.wrongList.push(q.word);

  updateProgressOnAnswer(STATE, q.word, isCorrect, today);
  saveState(STATE);

  const buttons = document.querySelectorAll('#optionsWrap .option');
  buttons.forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.correctIndex) b.classList.add('correct');
    else if(i===idx) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.textContent = isCorrect ? "정답이에요! 🎉" : `아쉬워요! 정답은 ${q.correctIndex+1}번이에요`;
  fb.className = 'feedback ' + (isCorrect?'ok':'no');

  const wordObj = wordByText(q.word);
  const exBox = document.getElementById('exampleBox');
  if(wordObj && wordObj.ex){
    exBox.innerHTML = `<span class="ex-label">✏️ ${wordObj.w} 예문</span>${wordObj.ex}`;
    exBox.classList.add('show');
  }
  document.getElementById('nextBtnWrap').classList.add('show');
  document.getElementById('btnNext').onclick = goNextQuestion;
}

function getRetryQuestions(){
  const sess = STATE.todaySession;
  if(!sess._retryQuestions || sess._retryQuestions.length===0){
    const words = sess.wrongList.map(w=>wordByText(w)).filter(Boolean);
    sess._retryQuestions = shuffle(words).map((w,i)=>{
      const type = Math.random()<0.5 ? 'w2m':'m2w';
      const pos = Math.floor(Math.random()*4);
      return makeQuestion(w, type, pos);
    });
  }
  return sess._retryQuestions;
}

function renderRetry(){
  const sess = STATE.todaySession;
  const rq = getRetryQuestions();
  if(sess.retryIndex >= rq.length){
    // 한 바퀴 다 돔: 이번 라운드에서 틀린 것만 다시 모아 재도전
    const stillWrong = rq.filter(q=>q.answered && q.userAnswer!==q.correctIndex).map(q=>q.word);
    if(stillWrong.length===0){
      sess.retryFinished = true;
      sess.retryActive = false;
      saveState(STATE);
      return renderRetryDone();
    }else{
      sess.wrongList = [...new Set(stillWrong)];
      sess._retryQuestions = null;
      sess.retryIndex = 0;
      saveState(STATE);
      return renderRetry();
    }
  }
  const q = rq[sess.retryIndex];
  const typeBadge = q.type==='w2m'
    ? `<span class="q-type-badge badge-w2m">💡 이 단어의 뜻은?</span>`
    : `<span class="q-type-badge badge-m2w">🔍 이 뜻을 가진 단어는?</span>`;

  app.innerHTML = `
    ${topbar(STATE.streak)}

        ${q.options.map((opt,i)=>`

          </button>`).join('')}

      <div class="example-box" id="exampleBox"></div>
      <div class="next-btn-wrap" id="nextBtnWrap">
        <button class="btn btn-mint" id="btnNext">다음 문제 ▶</button>
      </div>
    </div>
  `;
  document.querySelectorAll('#optionsWrap .option').forEach(btn=>{
    btn.onclick = ()=>{
      if(q.answered) return;
      q.answered = true;
      const idx = parseInt(btn.dataset.idx,10);
      q.userAnswer = idx;
      const isCorrect = idx===q.correctIndex;
      const buttons = document.querySelectorAll('#optionsWrap .option');
      buttons.forEach((b,i)=>{
        b.classList.add('disabled');
        if(i===q.correctIndex) b.classList.add('correct');
        else if(i===idx) b.classList.add('wrong');
      });
      const fb = document.getElementById('feedback');
      fb.textContent = isCorrect ? "정답이에요! 🎉" : "다음 라운드에서 또 나올 거예요!";
      fb.className = 'feedback ' + (isCorrect?'ok':'no');
      const wordObj = wordByText(q.word);
      const exBox = document.getElementById('exampleBox');
      if(wordObj && wordObj.ex){
        exBox.innerHTML = `<span class="ex-label">✏️ ${wordObj.w} 예문</span>${wordObj.ex}`;
        exBox.classList.add('show');
      }
      document.getElementById('nextBtnWrap').classList.add('show');
      document.getElementById('btnNext').onclick = ()=>{
        sess.retryIndex++;
        saveState(STATE);
        renderRetry();
      };

/* ========================= 6. 초기 진입 처리 ========================= */
(function init(){
  const today = todayStr();
  if(STATE.todaySession && STATE.todaySession.finished){
    const lastHistoryDate = STATE.history.length ? STATE.history[STATE.history.length-1].date : null;
    if(lastHistoryDate !== today){
      // 날짜가 바뀌었으면 세션 초기화 (기록은 보존)
      STATE.todaySession = null;
      saveState(STATE);
    }
  }else if(STATE.todaySession && !STATE.todaySession.finished){
    // 미완료 세션이 오늘 것이 아니면 초기화
    if(STATE.lastDate && STATE.lastDate !== today){
      STATE.todaySession = null;
      saveState(STATE);
    }
  }
  renderHome();
})();
</script>
</body>
</html>
