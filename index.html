<script>
/* ========================= 1. 단어 데이터는 words-data.js에서 불러옵니다 ========================= */

const DAILY_GOAL = 30;
const STORAGE_KEY = "eohwifox_state_v1";

/* ========================= 1-1. Firebase 클라우드 동기화 ========================= */
/* 🔧 아래 firebaseConfig 자리에 Firebase 콘솔 > 프로젝트 설정 > 내 앱 에서
   복사한 값을 그대로 붙여넣으세요. (중괄호 { } 안의 내용만 통째로 바꾸면 돼요) */
const firebaseConfig = {
  apiKey: "AIzaSyC_L-sDIXhhq_AR_zQUcqlsGR-VQVnCE_c",
  authDomain: "koreanfox-90187.firebaseapp.com",
  projectId: "koreanfox-90187",
  storageBucket: "koreanfox-90187.firebasestorage.app",
  messagingSenderId: "1002216963638",
  appId: "1:1002216963638:web:f8b1140ac2096ed25a2297"
};

let db = null;
let FIREBASE_READY = false;
try{
  if(typeof firebase !== 'undefined' && firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('여기에') === -1){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    FIREBASE_READY = true;
  }
}catch(e){ console.warn('Firebase 초기화 실패', e); }

const SYNC_CODE_KEY = 'eohwifox_sync_code';
function getSyncCode(){ return localStorage.getItem(SYNC_CODE_KEY); }
function setSyncCode(code){ localStorage.setItem(SYNC_CODE_KEY, code); }
function clearSyncCode(){ localStorage.removeItem(SYNC_CODE_KEY); }

function randomCode(len){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // 헷갈리는 0/O, 1/I 제외
  let s = '';
  for(let i=0;i<len;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

async function cloudDocExists(code){
  if(!FIREBASE_READY) return false;
  try{
    const doc = await db.collection('students').doc(code).get();
    return doc.exists;
  }catch(e){ return false; }
}
async function cloudFetch(code){
  if(!FIREBASE_READY) return null;
  try{
    const doc = await db.collection('students').doc(code).get();
    return doc.exists ? doc.data() : null;
  }catch(e){ return null; }
}
async function cloudPush(code, state){
  if(!FIREBASE_READY || !code) return;
  try{
    await db.collection('students').doc(code).set(state);
  }catch(e){ console.warn('클라우드 동기화 실패', e); }
}

/* ========================= 2. 유틸 함수 ========================= */
function todayStr(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function addDays(dateStr, n){
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate()+n);
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    return defaultState();
  }
}
function defaultState(){
  return {
    progress:{},      // word -> {status:'review7'|'review30'|'mastered', due:'YYYY-MM-DD'}
    history:[],        // [{date, correct, total}]
    streak:0,
    lastDate:null,
    lastSessionDate:null,
    todaySession:null
  };
}
let _syncTimer = null;
function saveState(state){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  const code = getSyncCode();
  if(code && FIREBASE_READY){
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(()=> cloudPush(code, state), 700);
  }
}

/* ========================= 3. 세션(문제) 생성 ========================= */
function wordByText(text){ return WORDS.find(x=>x.w===text); }

function buildOptions(correctWordObj, type){
  // type: 'w2m' (단어->뜻) or 'm2w' (뜻->단어)
  const pool = WORDS.filter(x=>x.w!==correctWordObj.w);
  const distractors = shuffle(pool).slice(0,3);
  const correctText = type==='w2m' ? correctWordObj.m : correctWordObj.w;
  const optionTexts = distractors.map(d => type==='w2m' ? d.m : d.w);
  return {correctText, optionTexts};
}

function makeQuestion(wordObj, type, correctPos){
  const {correctText, optionTexts} = buildOptions(wordObj, type);
  const options = new Array(4);
  options[correctPos] = correctText;
  const shuffledWrong = shuffle(optionTexts);
  let wi=0;
  for(let i=0;i<4;i++){
    if(i===correctPos) continue;
    options[i]=shuffledWrong[wi++];
  }
  return {
    word: wordObj.w,
    lv: wordObj.lv,
    type,
    prompt: type==='w2m' ? wordObj.w : wordObj.m,
    options,
    correctIndex: correctPos,
    answered:false,
    userAnswer:null
  };
}

function pickWordsForToday(state, today, excludeSet){
  excludeSet = excludeSet || new Set();
  const dueWords = [];
  const newCandidates = [];
  for(const w of WORDS){
    if(excludeSet.has(w.w)) continue;
    const p = state.progress[w.w];
    if(!p){
      newCandidates.push(w);
    }else if(p.status!=='mastered' && p.due && p.due<=today){
      dueWords.push(w);
    }
  }
  let selected = shuffle(dueWords);
  if(selected.length < DAILY_GOAL){
    const need = DAILY_GOAL - selected.length;
    selected = selected.concat(shuffle(newCandidates).slice(0,need));
  }
  if(selected.length < DAILY_GOAL){
    // 새 단어도 부족하면 마스터한 단어라도 복습용으로 채움
    const rest = WORDS.filter(w => !excludeSet.has(w.w) && !selected.find(s=>s.w===w.w));
    selected = selected.concat(shuffle(rest).slice(0, DAILY_GOAL-selected.length));
  }
  return selected.slice(0, DAILY_GOAL);
}

function computeCatchupDates(state, today, maxDays){
  maxDays = maxDays || 3;
  if(!state.lastSessionDate || state.lastSessionDate >= today) return [today];
  let d = addDays(state.lastSessionDate, 1);
  let dates = [];
  while(d < today){ dates.push(d); d = addDays(d,1); }
  dates.push(today);
  if(dates.length > maxDays) dates = dates.slice(dates.length - maxDays);
  return dates;
}

function generateSession(state){
  const today = todayStr();
  const dates = computeCatchupDates(state, today);
  const usedWords = new Set();
  const dayGroups = dates.map(d=>{
    const picked = pickWordsForToday(state, today, usedWords);
    picked.forEach(w=>usedWords.add(w.w));
    return {date:d, words:picked};
  });
  state.lastSessionDate = today;
  const studyItems = [];
  dayGroups.forEach(g => g.words.forEach(w => studyItems.push({word:w.w, date:g.date})));
  const allWords = dayGroups.flatMap(g=>g.words);
  const questions = allWords.map((w,i)=>{
    const type = i%2===0 ? 'w2m' : 'm2w';
    const correctPos = i%4;
    return makeQuestion(w, type, correctPos);
  });
  return {
    questions: shuffle(questions),
    studyItems,
    studyIndex: 0,
    phase: 'study',
    dayCount: dates.length,
    index:0,
    correctCount:0,
    wrongList:[],
    finished:false,
    retryQueue:[],
    retryIndex:0,
    retryActive:false,
    retryFinished:false
  };
}

/* ========================= 4. 진행도(간격 반복) 업데이트 ========================= */
function updateProgressOnAnswer(state, word, isCorrect, today){
  const p = state.progress[word] || {status:null, due:null, everWrong:false};
  if(isCorrect){
    if(!p.status){
      p.status='review7'; p.due=addDays(today,7);
    }else if(p.status==='review7'){
      p.status='review30'; p.due=addDays(today,30);
    }else if(p.status==='review30'){
      p.status='mastered'; p.due=null; p.everWrong=false;
    }else{
      p.status='mastered'; p.due=null; p.everWrong=false;
    }
  }else{
    p.status=null; p.due=null; // 초기화 -> 다음 새 단어 뽑을 때 다시 학습
    p.everWrong=true;
  }
  state.progress[word]=p;
}

function wrongBookWords(){
  return Object.keys(STATE.progress)
    .filter(w => STATE.progress[w].everWrong && STATE.progress[w].status!=='mastered')
    .map(w => wordByText(w))
    .filter(Boolean);
}

function finalizeSession(state){
  const today = todayStr();
  const sess = state.todaySession;
  const total = sess.questions.length;
  const correct = sess.correctCount;
  const existingIdx = state.history.findIndex(h=>h.date===today);
  const entry = {date:today, correct, total};
  if(existingIdx>=0) state.history[existingIdx]=entry;
  else state.history.push(entry);
  state.history.sort((a,b)=> a.date<b.date?-1:1);

  // streak 계산
  const yesterday = addDays(today,-1);
  if(state.lastDate===yesterday || state.lastDate===today){
    if(state.lastDate!==today) state.streak = (state.streak||0)+1;
  }else{
    state.streak = 1;
  }
  state.lastDate = today;
  sess.finished = true;
  saveState(state);
}

function renderHistory(){

  }
  const colors = [ "var(--mint-dark)","var(--butter-dark)","var(--coral-dark)","var(--lavender-dark)"];
  return last.map((h,i)=>{
    const pct = Math.round((h.correct/h.total)*100);
    const color = pct>=90?"var(--mint-dark)": pct>=70?"var(--butter-dark)":"var(--coral-dark)";
    const md = h.date.slice(5).replace('-','.');
    return `
      <div class="history-row">
        <span class="history-date">${md}</span>
        <span class="history-bar-wrap"><span class="history-bar" style="width:${pct}%;background:${color};"></span></span>
        <span class="history-pct" style="color:${color};">${pct}%</span>
      </div>`;
  }).join('');
}

  const dateLabel = item.date === today

      </div>
      <div class="feedback" id="feedback"></div>
      <div class="example-box" id="exampleBox"></div>
      <div class="next-btn-wrap" id="nextBtnWrap">
        <button class="btn btn-mint" id="btnNext">다음 문제 ▶</button>
      </div>
    </div>
  `;
  wireExitButton();
  document.querySelectorAll('#optionsWrap .option').forEach(btn=>{
    btn.onclick = ()=>{
      if(q.answered) return;
      q.answered = true;
      const idx = parseInt(btn.dataset.idx,10);
      const isCorrect = idx===q.correctIndex;
      updateProgressOnAnswer(STATE, q.word, isCorrect, todayStr());
      saveState(STATE);
      const buttons = document.querySelectorAll('#optionsWrap .option');
      buttons.forEach((b,i)=>{
        b.classList.add('disabled');
        if(i===q.correctIndex) b.classList.add('correct');
        else if(i===idx) b.classList.add('wrong');
      });
      const fb = document.getElementById('feedback');
      fb.textContent = isCorrect ? "정답이에요! 🎉" : `아쉬워요! 정답은 ${q.correctIndex+1}번이에요`;
      fb.className = 'feedback ' + (isCorrect?'ok':'no');
      const wordObj = wordByText(q.word);
      const exBox = document.getElementById('exampleBox');
      if(wordObj && wordObj.ex){
        exBox.innerHTML = `<span class="ex-label">✏️ ${wordObj.w} 예문</span>${wordObj.ex}`;
        exBox.classList.add('show');
      }
      document.getElementById('nextBtnWrap').classList.add('show');
      document.getElementById('btnNext').onclick = ()=>{
        STATE.wrongQuizSession.index++;
        saveState(STATE);
        renderWrongQuiz();
      };
    };
  });
}

function renderQuiz(){
  const sess = STATE.todaySession;
  const q = sess.questions[sess.index];
  if(!q){ finalizeSession(STATE); return renderHome(); }

  const doneCount = sess.index;
  const pct = Math.round((doneCount/sess.questions.length)*100);
  const typeBadge = q.type==='w2m'
    ? `<span class="q-type-badge badge-w2m">💡 이 단어의 뜻은?</span>`
    : `<span class="q-type-badge badge-m2w">🔍 이 뜻을 가진 단어는?</span>`;

  app.innerHTML = `
    ${topbar(STATE.streak, true)}
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div class="progress-count">${doneCount+1} / ${sess.questions.length}</div>
    </div>
    <div class="card">
      ${typeBadge}
      <div class="question-word">${q.prompt}</div>
      <div class="options" id="optionsWrap">
        ${q.options.map((opt,i)=>`
          <button class="option" data-idx="${i}">
            <span class="num">${i+1}</span><span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="example-box" id="exampleBox"></div>
      <div class="next-btn-wrap" id="nextBtnWrap">
        <button class="btn btn-mint" id="btnNext">다음 문제 ▶</button>
      </div>
    </div>
  `;

  wireExitButton();
  document.querySelectorAll('#optionsWrap .option').forEach(btn=>{
    btn.onclick = ()=> handleAnswer(parseInt(btn.dataset.idx,10));
  });
}

function handleAnswer(idx){
  const sess = STATE.todaySession;
  const q = sess.questions[sess.index];
  if(q.answered) return;
  q.answered = true;
  q.userAnswer = idx;
  const isCorrect = idx===q.correctIndex;
  const today = todayStr();

  if(isCorrect) sess.correctCount++;
  else if(!sess.wrongList.includes(q.word)) sess.wrongList.push(q.word);

  updateProgressOnAnswer(STATE, q.word, isCorrect, today);
  saveState(STATE);

  const buttons = document.querySelectorAll('#optionsWrap .option');
  buttons.forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.correctIndex) b.classList.add('correct');
    else if(i===idx) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.textContent = isCorrect ? "정답이에요! 🎉" : `아쉬워요! 정답은 ${q.correctIndex+1}번이에요`;
  fb.className = 'feedback ' + (isCorrect?'ok':'no');

  const wordObj = wordByText(q.word);
  const exBox = document.getElementById('exampleBox');
  if(wordObj && wordObj.ex){
    exBox.innerHTML = `<span class="ex-label">✏️ ${wordObj.w} 예문</span>${wordObj.ex}`;
    exBox.classList.add('show');
  }
  document.getElementById('nextBtnWrap').classList.add('show');
  document.getElementById('btnNext').onclick = goNextQuestion;
}

function goNextQuestion(){
  const sess = STATE.todaySession;
  sess.index++;
  saveState(STATE);
  if(sess.index >= sess.questions.length){
    finalizeSession(STATE);
    renderResult();
  }else{
    renderQuiz();
  }
}

function renderResult(){
  const sess = STATE.todaySession;
  const today = STATE.history.find(h=>h.date===todayStr());
  const acc = Math.round((today.correct/today.total)*100);
  const emoji = acc>=90?"🏆": acc>=70?"🌟": acc>=50?"🙂":"💪";
  const wrongCount = sess.wrongList.length;

  app.innerHTML = `
    ${topbar(STATE.streak)}
    <div class="card hero-card">
      <span class="result-emoji">${emoji}</span>
      <div class="result-score">${acc}%</div>
      <div class="result-sub">${today.correct} / ${today.total} 문제 정답</div>
      ${wrongCount>0 ? `
        <div class="wrong-list">
          <b style="font-size:13px;color:var(--coral-dark);">틀린 단어 ${wrongCount}개</b>
          ${sess.wrongList.map(w=>{
            const wo = wordByText(w);
            return `<div class="wrong-list-item"><b>${w}</b> — ${wo?wo.m:''}</div>`;
          }).join('')}
        </div>
        <button class="btn btn-primary" id="btnRetryNow">틀린 문제 바로 다시 풀기 🔁</button>
      ` : `<div class="feedback ok">한 문제도 안 틀렸어요! 완벽해요 🥳</div>`}
      <div style="height:10px;"></div>
      <button class="btn btn-secondary" id="btnHome">홈으로 가기</button>
    </div>
  `;
  const btnHome = document.getElementById('btnHome');
  if(btnHome) btnHome.onclick = renderHome;
  const btnRetryNow = document.getElementById('btnRetryNow');
  if(btnRetryNow) btnRetryNow.onclick = ()=>{
    STATE.todaySession.retryActive = true;
    STATE.todaySession.retryIndex = 0;
    saveState(STATE);
    renderRetry();
  };
}

function getRetryQuestions(){
  const sess = STATE.todaySession;
  if(!sess._retryQuestions || sess._retryQuestions.length===0){
    const words = sess.wrongList.map(w=>wordByText(w)).filter(Boolean);
    sess._retryQuestions = shuffle(words).map((w,i)=>{
      const type = Math.random()<0.5 ? 'w2m':'m2w';
      const pos = Math.floor(Math.random()*4);
      return makeQuestion(w, type, pos);
    });
  }
  return sess._retryQuestions;
}

function renderRetry(){
  const sess = STATE.todaySession;
  const rq = getRetryQuestions();
  if(sess.retryIndex >= rq.length){
    // 한 바퀴 다 돔: 이번 라운드에서 틀린 것만 다시 모아 재도전
    const stillWrong = rq.filter(q=>q.answered && q.userAnswer!==q.correctIndex).map(q=>q.word);
    if(stillWrong.length===0){
      sess.retryFinished = true;
      sess.retryActive = false;
      saveState(STATE);
      return renderRetryDone();
    }else{
      sess.wrongList = [...new Set(stillWrong)];
      sess._retryQuestions = null;
      sess.retryIndex = 0;
      saveState(STATE);
      return renderRetry();
    }
  }
  const q = rq[sess.retryIndex];
  const typeBadge = q.type==='w2m'
    ? `<span class="q-type-badge badge-w2m">💡 이 단어의 뜻은?</span>`
    : `<span class="q-type-badge badge-m2w">🔍 이 뜻을 가진 단어는?</span>`;

  app.innerHTML = `
    ${topbar(STATE.streak, true)}
    <div class="card">
      <div class="section-title">🔁 오답 다시 풀기 (${sess.retryIndex+1}/${rq.length})</div>
      ${typeBadge}
      <div class="question-word">${q.prompt}</div>
      <div class="options" id="optionsWrap">
        ${q.options.map((opt,i)=>`
          <button class="option" data-idx="${i}">
            <span class="num">${i+1}</span><span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="example-box" id="exampleBox"></div>
      <div class="next-btn-wrap" id="nextBtnWrap">
        <button class="btn btn-mint" id="btnNext">다음 문제 ▶</button>
      </div>
    </div>
  `;
  wireExitButton();
  document.querySelectorAll('#optionsWrap .option').forEach(btn=>{
    btn.onclick = ()=>{
      if(q.answered) return;
      q.answered = true;
      const idx = parseInt(btn.dataset.idx,10);
      q.userAnswer = idx;
      const isCorrect = idx===q.correctIndex;
      const buttons = document.querySelectorAll('#optionsWrap .option');
      buttons.forEach((b,i)=>{
        b.classList.add('disabled');
        if(i===q.correctIndex) b.classList.add('correct');
        else if(i===idx) b.classList.add('wrong');
      });
      const fb = document.getElementById('feedback');
      fb.textContent = isCorrect ? "정답이에요! 🎉" : "다음 라운드에서 또 나올 거예요!";
      fb.className = 'feedback ' + (isCorrect?'ok':'no');
      const wordObj = wordByText(q.word);
      const exBox = document.getElementById('exampleBox');
      if(wordObj && wordObj.ex){
        exBox.innerHTML = `<span class="ex-label">✏️ ${wordObj.w} 예문</span>${wordObj.ex}`;
        exBox.classList.add('show');
      }
      document.getElementById('nextBtnWrap').classList.add('show');
      document.getElementById('btnNext').onclick = ()=>{
        sess.retryIndex++;
        saveState(STATE);
        renderRetry();
      };
      saveState(STATE);
    };
  });
}

function renderRetryDone(){
  app.innerHTML = `
    ${topbar(STATE.streak)}
    <div class="card hero-card">
      <span class="result-emoji">🌱</span>
      <div class="hero-title">복습까지 완벽해요!</div>
      <p class="hero-sub">오늘 틀렸던 단어까지 모두 다시 익혔어요.<br>내일 또 새로운 단어로 만나요!</p>
      <button class="btn btn-primary" id="btnHome2">홈으로 가기</button>
    </div>
  `;
  document.getElementById('btnHome2').onclick = renderHome;
}

/* ========================= 6. 초기 진입 처리 ========================= */
function runStaleSessionCleanup(){
  const today = todayStr();
  if(STATE.todaySession && STATE.todaySession.finished){
    const lastHistoryDate = STATE.history.length ? STATE.history[STATE.history.length-1].date : null;
    if(lastHistoryDate !== today){
      // 날짜가 바뀌었으면 세션 초기화 (기록은 보존)
      STATE.todaySession = null;
      saveState(STATE);
    }
  }else if(STATE.todaySession && !STATE.todaySession.finished){
    // 미완료 세션이 오늘 것이 아니면 초기화
    if(STATE.lastDate && STATE.lastDate !== today){
      STATE.todaySession = null;
      saveState(STATE);
    }
  }
}

(async function init(){
  const code = getSyncCode();
  if(!code){
    return renderSyncGate();
  }
  if(FIREBASE_READY){
    try{
      const data = await cloudFetch(code);
      if(data){
        STATE = Object.assign(defaultState(), data);
      }
    }catch(e){ /* 오프라인이면 로컬 저장본으로 계속 진행 */ }
  }
  runStaleSessionCleanup();
  renderHome();
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
