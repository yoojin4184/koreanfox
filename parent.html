<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어휘여우 🦊 부모님 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="words-data.js"></script>
<style>
  :root{
    --mint:#B7E4C7; --mint-dark:#6FBF8B; --coral:#FFB5A7; --coral-dark:#FF8C7A;
    --butter:#FFE29A; --butter-dark:#FFCB61; --lavender:#D8C9F0; --lavender-dark:#B79CE8;
    --cream:#FFF8EF; --ink:#4A4460; --ink-soft:#8B85A0; --white:#FFFFFF;
    --shadow: 0 6px 0 rgba(74,68,96,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Gowun Dodum', sans-serif;
    background: radial-gradient(circle at 15% 10%, rgba(183,228,199,0.35), transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(255,181,167,0.3), transparent 40%),
                var(--cream);
    min-height:100vh; color:var(--ink);
  }
  #app{ max-width:520px; margin:0 auto; padding:20px 16px 60px; }
  .display{font-family:'Jua', sans-serif;}
  .logo{ display:flex; align-items:center; gap:8px; font-family:'Jua'; font-size:22px; margin-bottom:18px;}
  .logo .fox{font-size:28px;}
  .card{ background:var(--white); border-radius:26px; padding:22px 20px; box-shadow:var(--shadow); margin-bottom:16px; }
  .card-title{ font-family:'Jua'; font-size:16px; margin:0 0 12px; display:flex; align-items:center; gap:6px;}
  .code-input{ width:100%; padding:14px; border-radius:14px; border:2px solid var(--lavender); font-size:18px;
    font-family:'Jua'; text-align:center; letter-spacing:3px; margin-bottom:10px; box-sizing:border-box; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:'Jua'; font-size:16px;
    border:none; border-radius:16px; padding:14px 18px; cursor:pointer; width:100%; background:var(--coral); color:#fff;
    box-shadow:0 5px 0 rgba(0,0,0,0.12); }
  .btn:active{ transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,0.12); }
  .btn:disabled{ opacity:0.5; }
  .feedback{ text-align:center; font-size:13px; margin-top:8px; color:var(--coral-dark); min-height:18px; }
  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat-box{ background:var(--cream); border-radius:16px; padding:14px 8px; text-align:center; }
  .stat-num{ font-family:'Jua'; font-size:22px; display:block; }
  .stat-label{ font-size:12px; color:var(--ink-soft); }
  .history-row{ display:flex; align-items:center; justify-content:space-between; padding:10px 4px; border-bottom:1px dashed #EEE3D3; font-size:14px; }
  .history-row:last-child{border-bottom:none;}
  .history-bar-wrap{ flex:1; margin:0 12px; height:8px; background:#F0EAE0; border-radius:99px; overflow:hidden; }
  .history-bar{ height:100%; border-radius:99px; }
  .history-pct{ font-weight:700; width:44px; text-align:right; }
  .wb-item{ background:var(--cream); border-radius:14px; padding:12px 14px; margin-bottom:8px; }
  .wb-item b{ font-family:'Jua'; color:var(--coral-dark); }
  .empty-state{ text-align:center; color:var(--ink-soft); font-size:14px; padding:16px 0; }
  .streak-chip{ display:inline-flex; align-items:center; gap:4px; background:var(--white); border-radius:999px;
    padding:6px 14px; font-size:13px; font-weight:600; box-shadow:var(--shadow); color:var(--coral-dark); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC_L-sDIXhhq_AR_zQUcqlsGR-VQVnCE_c",
  authDomain: "koreanfox-90187.firebaseapp.com",
  projectId: "koreanfox-90187",
  storageBucket: "koreanfox-90187.firebasestorage.app",
  messagingSenderId: "1002216963638",
  appId: "1:1002216963638:web:f8b1140ac2096ed25a2297"
};
let db = null;
let FIREBASE_READY = false;
try{
  if(typeof firebase !== 'undefined' && firebaseConfig.apiKey.indexOf('여기에') === -1){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    FIREBASE_READY = true;
  }
}catch(e){ console.warn(e); }

const app = document.getElementById('app');
const LAST_CODE_KEY = 'eohwifox_parent_last_code';

function wordByText(w){ return WORDS.find(x=>x.w===w); }

function renderGate(){
  const lastCode = localStorage.getItem(LAST_CODE_KEY) || '';
  app.innerHTML = `
    <div class="logo"><span class="fox">🦊</span><span>어휘여우 · 부모님 대시보드</span></div>
    <div class="card">
      <div class="card-title">🔍 아이의 학습 코드 입력</div>
      <p style="font-size:13px;color:var(--ink-soft);margin:0 0 10px;">아이 기기의 "내 학습 코드 보기"에서 확인한 코드를 입력하세요.</p>
      <input type="text" id="codeInput" class="code-input" placeholder="예: A3F9K2" maxlength="8" value="${lastCode}">
      <button class="btn" id="btnView">조회하기</button>
      <div class="feedback" id="fb"></div>
    </div>
    ${!FIREBASE_READY ? `<div class="card"><div class="empty-state" style="color:var(--coral-dark);">⚠️ 클라우드 연결이 아직 설정되지 않았어요. index.html과 이 파일 상단의 firebaseConfig 값을 채워주세요.</div></div>` : ''}
  `;
  document.getElementById('btnView').onclick = doView;
  document.getElementById('codeInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') doView(); });
}

async function doView(){
  const val = document.getElementById('codeInput').value.trim().toUpperCase();
  const fb = document.getElementById('fb');
  const btn = document.getElementById('btnView');
  if(!val){ fb.textContent = '코드를 입력해주세요.'; return; }
  if(!FIREBASE_READY){ fb.textContent = '클라우드 연결이 설정되지 않았어요.'; return; }
  btn.textContent = '조회 중...'; btn.disabled = true;
  try{
    const doc = await db.collection('students').doc(val).get();
    if(!doc.exists){
      fb.textContent = '해당 코드를 찾을 수 없어요. 다시 확인해주세요.';
      btn.textContent = '조회하기'; btn.disabled = false;
      return;
    }
    localStorage.setItem(LAST_CODE_KEY, val);
    renderDashboard(val, doc.data());
  }catch(e){
    fb.textContent = '조회 중 오류가 발생했어요. 인터넷 연결을 확인해주세요.';
    btn.textContent = '조회하기'; btn.disabled = false;
  }
}

function renderDashboard(code, data){
  const progress = data.progress || {};
  const history = (data.history || []).slice(-14).reverse();
  const streak = data.streak || 0;
  const mastered = Object.values(progress).filter(p=>p.status==='mastered').length;
  const learning = Object.values(progress).filter(p=>p.status==='review7'||p.status==='review30').length;
  const total = WORDS.length;
  const wrongWords = Object.keys(progress)
    .filter(w => progress[w].everWrong && progress[w].status!=='mastered')
    .map(w => wordByText(w)).filter(Boolean);

  const historyHtml = history.length===0 ? `<div class="empty-state">아직 학습 기록이 없어요.</div>` :
    history.map(h=>{
      const pct = Math.round((h.correct/h.total)*100);
      const color = pct>=90?"var(--mint-dark)": pct>=70?"var(--butter-dark)":"var(--coral-dark)";
      const md = h.date.slice(5).replace('-','.');
      return `<div class="history-row">
        <span style="color:var(--ink-soft);">${md}</span>
        <span class="history-bar-wrap"><span class="history-bar" style="width:${pct}%;background:${color};"></span></span>
        <span class="history-pct" style="color:${color};">${pct}%</span>
      </div>`;
    }).join('');

  const wrongHtml = wrongWords.length===0 ? `<div class="empty-state">틀린 단어가 없어요 🌟</div>` :
    wrongWords.map(w=>`<div class="wb-item"><b>${w.w}</b> — ${w.m}</div>`).join('');

  app.innerHTML = `
    <div class="logo"><span class="fox">🦊</span><span>어휘여우 · 부모님 대시보드</span></div>
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;">
      <div style="font-family:'Jua';font-size:15px;">코드: ${code}</div>
      <span class="streak-chip">🔥 ${streak}일 연속</span>
    </div>
    <div class="card">
      <div class="card-title">📊 어휘 현황</div>
      <div class="stat-grid">
        <div class="stat-box"><span class="stat-num">${mastered}</span><span class="stat-label">완전 정복</span></div>
        <div class="stat-box"><span class="stat-num">${learning}</span><span class="stat-label">복습중</span></div>
        <div class="stat-box"><span class="stat-num">${total}</span><span class="stat-label">전체 단어</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📅 최근 학습 기록 (최대 14일)</div>
      ${historyHtml}
    </div>
    <div class="card">
      <div class="card-title">📕 아직 못 외운 단어 (${wrongWords.length}개)</div>
      ${wrongHtml}
    </div>
    <button class="btn" id="btnBack" style="background:var(--white);color:var(--ink);border:2px solid var(--lavender);box-shadow:none;">다른 코드 조회하기</button>
  `;
  document.getElementById('btnBack').onclick = renderGate;
}

renderGate();
</script>
</body>
</html>
